<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>T2R | Contact</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <!-- Custom CSS -->
  <link rel="stylesheet" href="css/style.css" />

  <script type="text/javascript">
    var submitted = false;
    function handleFormSubmit() {
      if(submitted) {
        // Show a success message or redirect
        alert("Thank you! Your message has been sent to T2R.");
        window.location.reload(); 
      }
    }
  </script>
</head>

<body>
  <div id="header-placeholder"></div>

  <main class="page-section">
    <div class="container">
      <div class="text-center mb-5">
        <div class="section-label">Contact</div>
        <h1 class="section-title">Connect With T2R</h1>
        <p class="section-copy mx-auto" style="max-width: 760px;">
          Have questions about sessions, collaborations, speaker opportunities, or institutional partnerships? Reach out to the T2R team.
        </p>
      </div>

      <div class="row g-4 align-items-stretch">
        <!-- LEFT: Contact Info -->
        <div class="col-lg-5">
          <div class="card-custom h-100 p-4 p-lg-5">
            <h3 class="mb-4">Contact Information</h3>
            <div class="mb-4">
              <div class="small text-secondary mb-1">Email</div>
              <div class="fw-semibold">connect.t2r@gmail.com</div>
            </div>
            <div class="mb-4">
              <div class="small text-secondary mb-1">Location</div>
              <div class="fw-semibold">Vishakapatnam, India</div>
            </div>
             <!-- <div class="mt-5">
              <div class="small text-secondary mb-3">Follow T2R</div>
              <div class="d-flex gap-3">
                <a href="#" class="btn btn-outline-success btn-sm">LinkedIn</a>
                <a href="#" class="btn btn-outline-success btn-sm">YouTube</a>
                <a href="#" class="btn btn-outline-success btn-sm">Instagram</a>
              </div>
            </div>  -->
          </div>
        </div>

        <!-- RIGHT: The Google Form -->
        <div class="col-lg-7">
            <div class="card-custom h-100 p-4 p-lg-5">
            <h3 class="mb-4">Send a Message</h3>

            <!-- Hidden iframe to keep the user on your page -->
            <script type="text/javascript">var submitted=false;</script>
            <iframe name="hidden_iframe" id="hidden_iframe" style="display:none;" 
                onload="if(submitted) { alert('Thank you! Your message has been sent.'); window.location.reload(); }"></iframe>

            <!-- FORM START -->
            <form 
                action="https://docs.google.com/forms/d/e/1FAIpQLSe0uPNh-y_F_3I91q8KU6P1e4GW8CO0I46zkruxwV0CIBpamw/formResponse" 
                method="POST" 
                target="hidden_iframe" 
                onsubmit="submitted=true;"
            >

                <!-- NAME -->
                <div class="mb-4">
                <label class="form-label">Full Name</label>
                <input
                    type="text"
                    name="entry.2005620554"
                    class="form-control form-control-lg"
                    placeholder="Enter your name"
                    required
                />
                </div>

                <!-- EMAIL -->
                <div class="mb-4">
                <label class="form-label">Email Address</label>
                <input
                    type="email"
                    name="entry.1045781291"
                    class="form-control form-control-lg"
                    placeholder="Enter your email"
                    required
                />
                </div>

                <!-- SUBJECT -->
                <div class="mb-4">
                <label class="form-label">Subject</label>
                <select name="entry.2037136655" class="form-select form-select-lg" required>
                    <option value="" disabled selected>Select an option</option>
                    <option value="Guest Lecture">Guest Lecture</option>
                    <option value="Collaboration">Collaboration</option>
                    <option value="Student Support">Student Support</option>
                    <option value="Partnership">Partnership</option>
                    <option value="Other">Other</option>
                </select>
                </div>

                <!-- MESSAGE -->
                <div class="mb-4">
                <label class="form-label">Message</label>
                <textarea
                    name="entry.839337160"
                    class="form-control"
                    rows="6"
                    placeholder="Write your message here..."
                    required
                ></textarea>
                </div>

                <!-- BUTTON -->
                <button type="submit" class="btn btn-success btn-custom w-100">
                Send Message
                </button>

            </form>
            </div>
      </div>
    </div>
  </main>

  <div id="footer-placeholder"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/include.js"></script>
  <script src="js/script.js"></script>
</body>
</html>
